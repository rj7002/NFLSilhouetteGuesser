[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "nss", "nspr", "atk", "cups", "gtk3", "libdrm", "mesa", "alsa-lib", "pango", "cairo", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb", "xorg.libXkbcommon"]

[phases.install]
cmds = ["npm ci", "npx playwright install chromium --with-deps"]

[phases.build]
cmds = ["npm run build"]
